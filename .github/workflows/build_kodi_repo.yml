name: Publicar repositorio Kodi

on:
  push:
    paths:
      - 'plugin.video.bootcamp_data_science/**'  # Solo al cambiar el addon
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install lxml

      - name: Generar repositorio Kodi
        run: python build_repo.py

      - name: Commit y push artefactos del repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "🏗️ Build repo Kodi $(date +'%Y-%m-%d')"
          git pull --rebase
          git push